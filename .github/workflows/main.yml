name: Normal-RDP-Setup
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: 1. Setup User & RDP
      run: |
        $user = "FaizLive"
        # Password policy pass karne ke liye strong password
        $pass = "Faiz@1611#Live"
        net user $user $pass /add
        net localgroup administrators $user /add
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        # Screen sleep off
        powercfg /x -monitor-timeout-ac 0

    - name: 2. Install Tailscale & Connect
      run: |
        Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile tailscale.exe
        Start-Process tailscale.exe -ArgumentList "/quiet" -Wait
        # Yahan 'TAILSCALE_AUTH_KEY' secret se hi uthayega
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --accept-routes --hostname FaizLivePC

    - name: 3. Keep RDP Alive (6 Hours)
      run: |
        $totalMinutes = 350
        $start = Get-Date
        Write-Host "****************************************************"
        Write-Host "CONNECT TO: FaizLivePC.tailbaaed9.ts.net" -ForegroundColor Yellow -BackgroundColor Red
        Write-Host "Username: FaizLive | Password: Faiz@1611#Live"
        Write-Host "****************************************************"
        
        while (((Get-Date) - $start).TotalMinutes -lt $totalMinutes) {
          $elapsed = [math]::Floor(((Get-Date) - $start).TotalMinutes)
          Write-Output "RDP Session Running... $elapsed mins"
          Start-Sleep -Seconds 60
        }
        
